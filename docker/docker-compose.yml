services:
  postgres:
    image: postgres:17-alpine
    restart: always
    ports:
      - "5435:5432"
    env_file:
      - ./.env
    volumes:
      - ./postgres:/var/lib/postgresql/data
      #- ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10