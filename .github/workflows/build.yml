name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CACHEBUST=${{ github.sha }}

  deploy:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        if: success()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not set — skipping deploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"

      # Purge the Cloudflare edge cache AFTER the VPS has pulled + restarted, so
      # Cloudflare re-caches the NEW build instead of the old one still serving.
      # The webhook is fire-and-forget, so we wait through the restart window and
      # purge a few times to be safe. Never fails the workflow.
      - name: Purge Cloudflare cache
        if: success()
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ZONE" ]; then
            echo "Cloudflare secrets not set — skipping cache purge."
            exit 0
          fi
          purge() {
            resp=$(curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/purge_cache" \
                 -H "Authorization: Bearer $CF_TOKEN" \
                 -H "Content-Type: application/json" \
                 --data '{"purge_everything":true}')
            if echo "$resp" | grep -q '"success":true'; then
              echo "✓ Cloudflare cache purged"
            else
              # Response body (no token) shows the real cause, e.g. bad zone id / token scope.
              echo "✗ purge failed: $resp"
            fi
          }
          # Spread purges across the pull+restart window (~2.5 min total).
          sleep 45; purge
          sleep 45; purge
          sleep 60; purge
          echo "Done."


