# Production stack for tynkybordel.shop
# ────────────────────────────────────────────────────────────────────────────
# Usage on the VPS:
#   1. cp .env.production.example .env.production && vim .env.production
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. First-run only — apply migrations + seed products:
#        docker compose -f docker-compose.prod.yml run --rm app npx tsx server/database/migrate.ts
#        docker compose -f docker-compose.prod.yml run --rm app npm run seed
#
# Caddy auto-provisions Let's Encrypt certificates for the domain listed in
# Caddyfile. Cloudflare should be set to "Full (strict)" SSL/TLS mode.

services:
  postgres:
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shopik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-shopik}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shopik} -d ${POSTGRES_DB:-shopik}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-shopik}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-shopik}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persist user-uploaded product images across rebuilds.
      - uploads:/app/.output/public/uploads
    networks:
      - internal
      - web

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  internal:
  web:
